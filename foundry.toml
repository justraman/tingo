[profile.default]
src         = "contracts"
test        = "test"
out         = "forge-out"               # avoid colliding with Next.js's `./out` static-export dir
cache_path  = "forge-cache"
libs        = ["lib"]
solc_version = "0.8.24"
optimizer   = true
optimizer_runs = 200
via_ir      = true
evm_version = "cancun"
fs_permissions = [{ access = "read", path = "./contracts" }]

[fmt]
line_length = 110
tab_width   = 4
bracket_spacing = false

[fuzz]
runs = 64
